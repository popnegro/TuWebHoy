<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO Mendoza | Pedir o Reservar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bs-primary: #f0ad4e; }
        body { background: #f8f9fa; font-family: 'Roboto', sans-serif; }
        .hero-full { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1549113273-0402b1158fba?auto=format&fit=crop&q=80') center/cover; }
        .btn-whatsapp { background-color: #25d366; color: white; border-radius: 50px; font-weight: bold; }
        .btn-whatsapp:hover { background-color: #128c7e; color: white; }
        .nav-pills .nav-link.active { background-color: #f0ad4e !important; color: white !important; }
        
        /* Transiciones suaves para pestañas */
        .tab-content .tab-pane { opacity: 0; transition: opacity 0.3s ease-in-out; display: none; }
        .tab-content .tab-pane.active { opacity: 1; display: block; }
        
        #map { height: 180px; width: 100%; border-radius: 12px; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <section class="hero-full px-2 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <div class="card p-4 shadow-lg border-0 rounded-4">
                        
                        <ul class="nav nav-pills nav-justified mb-4">
                            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#inmediato">Ahora</button></li>
                            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#reservar">Reservar</button></li>
                        </ul>

                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="inmediato">
                                <div id="map"></div>
                                <input type="text" id="origen-now" class="form-control mb-2" placeholder="Tu ubicación...">
                                <input type="text" id="destino-now" class="form-control mb-2" placeholder="¿A dónde vas?">
                                <button onclick="enviarPedido('AHORA')" class="btn btn-whatsapp w-100 py-2">PEDIR YA</button>
                            </div>

                            <div class="tab-pane fade" id="reservar">
                                <input type="text" id="origen-res" class="form-control mb-2" placeholder="Origen">
                                <input type="text" id="destino-res" class="form-control mb-2" placeholder="Destino">
                                <div class="row g-2">
                                    <div class="col-6"><input type="date" id="fecha" class="form-control mb-2"></div>
                                    <div class="col-6"><input type="time" id="hora" class="form-control mb-2"></div>
                                </div>
                                <button onclick="enviarPedido('RESERVA')" class="btn btn-dark w-100 py-2">CONFIRMAR RESERVA</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCuFEjycWBUxeJ32jWckekiIutLgcul21Q&libraries=places"></script>
    
    <script>
        // Configuración de fecha mínima
        document.getElementById('fecha').setAttribute('min', new Date().toISOString().split('T')[0]);

        // Lógica de pestañas con animación manual para mayor compatibilidad
        document.querySelectorAll('button[data-bs-toggle="pill"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active', 'show'));
                document.querySelector(e.target.dataset.bsTarget).classList.add('active', 'show');
            });
        });

        // Enviar pedido a WhatsApp
        function enviarPedido(tipo) {
            const tel = "5492613871088";
            let msg = `🚕 *TAXI-GO MENDOZA*\n\n`;
            
            if(tipo === 'AHORA') {
                const ori = document.getElementById('origen-now').value;
                const des = document.getElementById('destino-now').value;
                if(!ori || !des) return alert("Completá origen y destino");
                msg += `*Tipo:* Inmediato\n*Origen:* ${ori}\n*Destino:* ${des}`;
            } else {
                const f = document.getElementById('fecha').value;
                const h = document.getElementById('hora').value;
                if(!f || !h) return alert("Seleccioná fecha y hora");
                msg += `*Tipo:* Reserva\n*Origen:* ${document.getElementById('origen-res').value}\n*Destino:* ${document.getElementById('destino-res').value}\n*Fecha:* ${f} ${h}`;
            }
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Autocomplete
        ['origen-now', 'destino-now', 'origen-res', 'destino-res'].forEach(id => {
            new google.maps.places.Autocomplete(document.getElementById(id), { componentRestrictions: { country: "ar" }});
        });
    </script>
</body>
</html>
